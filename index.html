<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/images/logos/aeromitra-logo.webp" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link
    href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=Montserrat:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <title>Aeromitra | Best Aviation Academy in Delhi, India</title>

  <!-- Structured Data: LocalBusiness -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "EducationalOrganization",
    "name": "Aeromitra Aviation Academy",
    "alternateName": "AMA - Aeromitra",
    "url": "https://aeromitra.com",
    "telephone": "+919999228597",
    "email": "admin@aeromitra.com",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Delhi",
      "addressRegion": "Delhi",
      "addressCountry": "IN"
    },
    "openingHoursSpecification": {
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": [
        "Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"
      ],
      "opens": "09:30",
      "closes": "18:30"
    }
  }
  </script>

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Aeromitra Aviation Academy",
    "url": "https://aeromitra.com",
    "logo": "/images/logos/aeromitra-logo.webp",
    "sameAs": [
      "https://aeromitra.com"
    ]
  }
  </script>

  <!-- Structured Data: WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org/",
    "@type": "WebSite",
    "name": "Aeromitra Aviation Academy",
    "url": "https://aeromitra.com",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://aeromitra.com/?s={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
